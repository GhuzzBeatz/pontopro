<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../css/style.css"><script src="../js/util.js"></script></head>
<body>
<div class="page-content">
  <div class="page-hdr-row page-header">
    <div><h1>📋 Registros de Ponto</h1><p>Visualize e gerencie todos os registros</p></div>
    <button class="btn btn-primary" onclick="abrirModalManual()">+ Registrar Manual</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <select id="filtFunc" onchange="render()" style="flex:1;min-width:200px"><option value="">Todos os funcionários</option></select>
    <input type="date" id="filtData" onchange="render()" style="width:160px">
    <select id="filtTipo" onchange="render()" style="width:160px">
      <option value="">Todos os tipos</option>
      <option value="entrada">Entrada</option>
      <option value="almoco_saida">Saída Almoço</option>
      <option value="almoco_retorno">Retorno Almoço</option>
      <option value="saida">Saída</option>
    </select>
  </div>
  <div class="card tbl-wrap">
    <table>
      <thead><tr><th>Data</th><th>Funcionário</th><th>Hora</th><th>Tipo</th><th>Ações</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="aviso av-ok" id="avisoOk"></div>
  <div class="aviso av-err" id="avisoErro"></div>
</div>
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:var(--card);border:1px solid var(--border2);border-radius:16px;width:420px;max-width:97vw">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:800;font-size:14px;color:var(--fg)">+ Registrar Ponto Manual</span>
      <button onclick="fecharModal()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button>
    </div>
    <div style="padding:20px">
      <div class="form-group"><label class="form-label">Funcionário *</label><select id="mFunc"><option value="">Selecione...</option></select></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Data *</label><input type="date" id="mData"></div>
        <div class="form-group"><label class="form-label">Hora *</label><input type="time" id="mHora"></div>
      </div>
      <div class="form-group"><label class="form-label">Tipo *</label>
        <select id="mTipo">
          <option value="entrada">Entrada</option>
          <option value="almoco_saida">Saída Almoço</option>
          <option value="almoco_retorno">Retorno Almoço</option>
          <option value="saida">Saída</option>
        </select>
      </div>
      <div class="aviso av-err" id="mErr"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarManual()">💾 Registrar</button>
      </div>
    </div>
  </div>
</div>
<script>
aplicarTemaAtual()
const { listarFuncionarios, listarRegistros, deletarRegistro, lerJSON, salvarJSON } = require('../js/db.js')
const TIPOS = { entrada:'🟢 Entrada', almoco_saida:'🟡 Saída Almoço', almoco_retorno:'🟡 Retorno', saida:'🔴 Saída' }
const BADGES = { entrada:'b-green', almoco_saida:'b-orange', almoco_retorno:'b-orange', saida:'b-red' }

const funcs = listarFuncionarios()
const sel = document.getElementById('filtFunc')
const mSel = document.getElementById('mFunc')
funcs.forEach(f => {
  sel.innerHTML  += `<option value="${f.id}">${f.nome}</option>`
  mSel.innerHTML += `<option value="${f.id}">${f.nome}</option>`
})
document.getElementById('filtData').value = new Date().toISOString().split('T')[0]
document.getElementById('mData').value    = new Date().toISOString().split('T')[0]
document.getElementById('mHora').value    = new Date().toTimeString().slice(0,5)

function render() {
  const fid   = document.getElementById('filtFunc').value
  const data  = document.getElementById('filtData').value
  const tipo  = document.getElementById('filtTipo').value
  const filtros = {}
  if (fid)  filtros.funcionario_id = Number(fid)
  if (data) filtros.data = data
  let lista = listarRegistros(filtros)
  if (tipo) lista = lista.filter(r => r.tipo === tipo)
  document.getElementById('tbody').innerHTML = lista.length ? lista.map(r => {
    const f = funcs.find(x => x.id === Number(r.funcionario_id)) || {}
    return `<tr>
      <td>${r.data.split('-').reverse().join('/')}</td>
      <td style="font-weight:600;color:var(--fg)">${f.nome||'—'}</td>
      <td style="font-family:monospace;font-weight:700">${r.hora}</td>
      <td><span class="badge ${BADGES[r.tipo]||'b-gray'}">${TIPOS[r.tipo]||r.tipo}</span></td>
      <td><button class="btn btn-danger" style="padding:4px 9px;font-size:11px" onclick="excluir(${r.id})">🗑️</button></td>
    </tr>`}).join('') : '<tr><td colspan="5" class="empty">Nenhum registro encontrado.</td></tr>'
}

function excluir(id) {
  confirmar('Excluir este registro?', ok => { if(!ok) return; deletarRegistro(id); aviso('ok','Registro excluído.'); render() })
}

function abrirModalManual() { document.getElementById('modal').style.display='flex' }
function fecharModal()      { document.getElementById('modal').style.display='none' }

function salvarManual() {
  const fid  = document.getElementById('mFunc').value
  const data = document.getElementById('mData').value
  const hora = document.getElementById('mHora').value
  const tipo = document.getElementById('mTipo').value
  const err  = document.getElementById('mErr')
  err.style.display = 'none'
  if (!fid||!data||!hora) { err.textContent='Preencha todos os campos'; err.style.display='block'; return }
  try {
    const lista = lerJSON('registros')
    const { nextId, agora } = require('../js/db.js')
    lista.push({ id: nextId(lista), funcionario_id: Number(fid), data, hora, tipo, manual: true, criado_em: agora() })
    salvarJSON('registros', lista)
    aviso('ok','✅ Registro manual adicionado!')
    fecharModal(); render()
  } catch(e) { err.textContent='Erro: '+e.message; err.style.display='block' }
}
render()
</script>
</body>
</html>
